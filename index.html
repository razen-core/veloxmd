<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="theme-color" content="#0f172a">
    <title>Pro MarkDown - Professional Dashboard</title>
    <meta name="description" content="Pro MarkDown is a next-generation markdown editor dashboard designed for speed, clarity, and professional workflow management.">
    <meta name="keywords" content="markdown editor, dashboard, productivity, writing tool, pro markdown, cms">
    <meta name="author" content="Pro MarkDown">
    <meta name="robots" content="index, follow">
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourwebsite.com/">
    <meta property="og:title" content="Pro MarkDown - Professional Dashboard">
    <meta property="og:description" content="Experience the ultimate professional markdown workflow.">
    <meta property="og:image" content="https://yourwebsite.com/assets/preview-image.jpg">
    
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="Pro MarkDown - Professional Dashboard">
    <meta property="twitter:description" content="Experience the ultimate professional markdown workflow.">
    
    <link rel="icon" type="image/png" href="assets/favicon.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1 class="dashboard-title">My Documents</h1>
            <div class="controls">
                <button id="theme-toggle" title="Toggle Theme">
                    <i class="fas fa-moon"></i>
                </button>
                <a href="editor.html" id="new-document-btn" class="cta-button">
                    <i class="fas fa-plus"></i> <span class="cta-button-text">New Document</span>
                </a>
            </div>
        </header>
        <main class="dashboard-main">
            <section id="documents-grid" class="documents-grid">
                <!-- Documents will be dynamically inserted here -->
            </section>
        </main>
        <footer class="dashboard-footer">
            <p>&copy; <span id="copyright-year">2025</span> Pro MarkDown</p>
        </footer>
    </div>
    <script src="dashboard.js" defer></script>

    <!-- Custom Modal -->
    <div id="modal-overlay" class="hidden">
        <div id="modal">
            <h3 id="modal-title"></h3>
            <p id="modal-message"></p>
            <input type="text" id="modal-input" class="hidden">
            <div id="modal-actions">
                <button id="modal-cancel-btn">Cancel</button>
                <button id="modal-confirm-btn">Confirm</button>
            </div>
        </div>
    </div>
</body>
</html>
