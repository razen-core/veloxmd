<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro MarkDown - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&family=Rubik:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>Pro MarkDown</h1>
            <p>A modern, minimalist Markdown editor for pros.</p>
        </header>
        <main class="dashboard-main">
            <a href="editor.html" class="cta-button">Launch Editor</a>
            <section id="recent-documents" class="recent-documents">
                <h2>Recent Documents</h2>
                <ul id="recent-files-list">
                    <!-- Recent files will be dynamically inserted here -->
                </ul>
            </section>
            <section class="features">
                <h2>Features</h2>
                <ul>
                    <li><i class="fas fa-eye"></i> Live Preview</li>
                    <li><i class="fas fa-code"></i> Syntax Highlighting</li>
                    <li><i class="fas fa-adjust"></i> Dark/Light Mode</li>
                    <li><i class="fas fa-mobile-alt"></i> Responsive Design</li>
                </ul>
            </section>
        </main>
        <footer class="dashboard-footer">
            <p>&copy; <span id="copyright-year">2025</span> Pro MarkDown</p>
        </footer>
    </div>
    <script src="dashboard.js" defer></script>
</body>
</html>
