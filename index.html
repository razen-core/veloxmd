<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro MarkDown - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&family=Rubik:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1 class="dashboard-title">My Documents</h1>
            <a href="editor.html" id="new-document-btn" class="cta-button">
                <i class="fas fa-plus"></i> New Document
            </a>
        </header>
        <main class="dashboard-main">
            <section id="documents-grid" class="documents-grid">
                <!-- Documents will be dynamically inserted here -->
            </section>
        </main>
        <footer class="dashboard-footer">
            <p>&copy; <span id="copyright-year">2025</span> Pro MarkDown</p>
        </footer>
    </div>
    <script src="dashboard.js" defer></script>
</body>
</html>
