<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velox Markdown</title>
    
    <!-- Preconnect to external domains for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    
    <!-- Google Fonts: Outfit, Manrope, and JetBrains Mono -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Lexend:ital,wght@0,400;0,500;0,600;0,700;1,400&family=PT+Mono:wght@400;500;700&display=swap" rel="stylesheet">
        
    <!-- Font Awesome for Icons (v7 webfonts build in icons/css/all.css) -->
    <link rel="stylesheet" href="icons/css/all.css" />
    
    <!-- JS Libraries: marked for parsing, highlight.js for syntax highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/marked@16.4.1/lib/marked.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/highlight.min.js"></script>

    <!-- KaTeX for LaTeX rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension/lib/index.umd.js"></script>
    
    <!-- Custom Styles and Script -->
    <link rel="stylesheet" href="style.css">
    <script src="fs-helpers.js" defer></script>
    <script src="editor.js" defer></script>
    <script src="toolbar.js" defer></script>
    <script src="ai.js" defer></script>
</head>
<body>
    <div id="app-container">
        <header id="app-header">
            <div class="header-left">
                <a href="index.html" class="back-to-dashboard" title="Back to Dashboard">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
                <button id="sidebar-toggle" title="Toggle Sidebar">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <h1 id="app-title">Velox Editor</h1>
            </div>
            <div class="controls">
                <!-- Desktop: all buttons visible -->
                <div class="export-dropdown desktop-only">
                    <button id="export-btn" title="Export as PDF">
                        <i class="fa-solid fa-download"></i>
                    </button>
                    <button id="export-dropdown-toggle" title="Export Options">
                        <i class="fa-solid fa-chevron-down"></i>
                    </button>
                    <div id="export-menu" class="hidden">
                        <button id="export-pdf-btn"><i class="fa-solid fa-file-pdf"></i> Export as PDF</button>
                        <button id="export-html-btn"><i class="fa-solid fa-file-code"></i> Export as HTML</button>
                    </div>
                </div>
                <button id="view-toggle" title="Toggle Preview">
                    <i class="fa-solid fa-eye"></i>
                </button>
                <button id="theme-toggle" class="desktop-only" title="Toggle Theme">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <button id="settings-btn" class="desktop-only" title="Settings">
                    <i class="fa-solid fa-cog"></i>
                </button>

                <!-- Mobile: More button only — dropdown is in body below -->
                <div class="more-menu-wrapper mobile-only">
                    <button id="more-menu-btn" title="More Options">
                        <i class="fa-solid fa-ellipsis-vertical"></i>
                    </button>
                </div>
            </div>
        </header>

        <div id="find-replace-panel" class="hidden">
            <div class="find-replace-container">
                <div class="find-replace-inputs">
                    <div class="input-group">
                        <input type="text" id="find-input" placeholder="Find...">
                        <input type="text" id="replace-input" placeholder="Replace with...">
                        <span id="find-counter">0 of 0</span>
                    </div>
                </div>
                <div class="find-replace-actions">
                    <button id="find-prev-btn" class="pill-btn" title="Previous Match">
                        <i class="fa-solid fa-chevron-up"></i> Prev
                    </button>
                    <button id="find-next-btn" class="pill-btn" title="Next Match">
                        <i class="fa-solid fa-chevron-down"></i> Next
                    </button>
                    <button id="replace-btn" class="pill-btn" title="Replace">
                        <i class="fa-solid fa-rotate"></i> Replace
                    </button>
                    <button id="replace-all-btn" class="pill-btn" title="Replace All">
                        <i class="fa-solid fa-rotate-left"></i> Replace All
                    </button>
                </div>
                <button id="close-find-btn" title="Close Search">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
        </div>

        <div id="app-body">
            <aside id="sidebar" class="hidden">
                <div id="sidebar-header">
                    <div class="sidebar-tabs">
                        <button id="tab-outline" class="tab-btn active">Outline</button>
                        <button id="tab-files" class="tab-btn">Files</button>
                    </div>
                    <button id="new-file-btn-sidebar" class="hidden" title="New File">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
                <div id="table-of-contents" class="sidebar-content"></div>
                <div id="file-list" class="sidebar-content hidden"></div>
            </aside>
            <main id="app-main">
                <div id="editor-container">
                    <div id="editor-backdrop"></div>
                    <textarea id="editor" spellcheck="false"></textarea>
                </div>
                <div id="preview" class="hidden"></div>
            </main>
        </div>

        <footer id="app-footer">
            <div id="stats">
                <span>Words: <span id="word-count">0</span></span>
                <span>&nbsp;&nbsp;|&nbsp;&nbsp;</span>
                <span>Chars: <span id="char-count">0</span></span>
            </div>
        </footer>
    </div>

    <!-- Custom Modal -->
    <div id="modal-overlay" class="hidden">
        <div id="modal">
            <h3 id="modal-title"></h3>
            <p id="modal-message"></p>
            <input type="text" id="modal-input" class="hidden">
            <div id="modal-actions">
                <button id="modal-cancel-btn">Cancel</button>
                <button id="modal-confirm-btn">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Floating Toolbar -->
    <div id="floating-toolbar" class="floating-toolbar">
        <div class="toolbar-drag-handle">
            <i class="fa-solid fa-grip-lines"></i>
        </div>
        <div class="toolbar-actions">
            <!-- Existing utility buttons -->
            <button class="toolbar-btn" data-action="insert-tab" title="Insert Tab">
                <i class="fa-solid fa-indent"></i>
            </button>

            <div class="toolbar-divider"></div>

            <!-- Formatting buttons -->
            <button class="toolbar-btn" data-action="format-bold" title="Bold (Ctrl+B)">
                <i class="fa-solid fa-bold"></i>
            </button>
            <button class="toolbar-btn" data-action="format-italic" title="Italic (Ctrl+I)">
                <i class="fa-solid fa-italic"></i>
            </button>
            <button class="toolbar-btn" data-action="format-heading" title="Heading (Ctrl+H)">
                <i class="fa-solid fa-heading"></i>
            </button>
            <button class="toolbar-btn" data-action="format-link" title="Link (Ctrl+K)">
                <i class="fa-solid fa-link"></i>
            </button>
            <button class="toolbar-btn" data-action="format-inline-code" title="Inline Code (Ctrl+`)">
                <i class="fa-solid fa-code"></i>
            </button>
            <button class="toolbar-btn" data-action="format-code-block" title="Code Block">
                <i class="fa-solid fa-file-code"></i>
            </button>
            <button class="toolbar-btn" data-action="format-blockquote" title="Blockquote">
                <i class="fa-solid fa-quote-left"></i>
            </button>
            <button class="toolbar-btn" data-action="format-hr" title="Horizontal Rule">
                <i class="fa-solid fa-minus"></i>
            </button>

            <div class="toolbar-divider"></div>

            <!-- Parentheses () -->
            <button class="toolbar-btn" data-action="insert-pair" data-pair="()" title="Insert Parentheses ()">
                <span style="font-size: 16px; font-weight: bold; font-family: var(--font-mono);">()</span>
            </button>
            
            <!-- Braces {} -->
            <button class="toolbar-btn" data-action="insert-pair" data-pair="{}" title="Insert Braces {}">
                <span style="font-size: 16px; font-weight: bold; font-family: var(--font-mono);">{}</span>
            </button>
            
            <!-- Brackets [] -->
            <button class="toolbar-btn" data-action="insert-pair" data-pair="[]" title="Insert Brackets []">
                <span style="font-size: 16px; font-weight: bold; font-family: var(--font-mono);">[]</span>
            </button>

            <!-- LaTeX $$ -->
            <button class="toolbar-btn" data-action="insert-pair" data-pair="$$" title="Insert LaTeX $$">
                <span style="font-size: 16px; font-weight: bold; font-family: var(--font-mono); font-style: italic;">$$</span>
            </button>

            <div class="toolbar-divider"></div>

            <button class="toolbar-btn" data-action="move-left" title="Move Left">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <button class="toolbar-btn" data-action="move-right" title="Move Right">
                <i class="fa-solid fa-arrow-right"></i>
            </button>
            <button class="toolbar-btn" data-action="move-up" title="Move Up">
                <i class="fa-solid fa-arrow-up"></i>
            </button>
            <button class="toolbar-btn" data-action="move-down" title="Move Down">
                <i class="fa-solid fa-arrow-down"></i>
            </button>
            <button id="ai-mode-btn" class="toolbar-btn" title="AI Mode">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
            </button>
        </div>
        <button class="toolbar-close-btn" title="Close Toolbar">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>

    <!-- AI Modal -->
    <div id="ai-modal-overlay" class="hidden">
        <div id="ai-modal">
            <div id="ai-modal-header">
                <h2>AI Assistant</h2>
                <div style="flex-grow: 1;"></div>
                <button id="ai-new-chat-btn" title="New Chat"><i class="fa-solid fa-trash-can"></i></button>
                <button id="ai-modal-close-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="ai-modal-body">
                <div id="ai-chat-container"></div>
                <div id="ai-input-container">
                    <textarea id="ai-input" placeholder="Ask AI to write or edit..."></textarea>
                    <div id="ai-button-wrapper">
                        <button id="ai-send-btn">
                            <i class="fa-solid fa-arrow-up"></i>
                        </button>
                        <button id="ai-stop-btn" class="hidden">
                            <i class="fa-solid fa-stop"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <div id="ai-actions-template" style="display: none;">
            <button class="ai-action-btn replace-btn" title="Replace Code"><i class="fa-solid fa-file-import"></i></button>
            <button class="ai-action-btn replace-save-btn" title="Replace & Save"><i class="fa-solid fa-save"></i></button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal-overlay" class="hidden">
        <div id="settings-modal">
            <div id="settings-modal-header">
                <h2>Settings</h2>
                <button id="settings-modal-close-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="settings-modal-body">
                <div class="settings-field">
                    <label for="api-key-input">Gemini API Key</label>
                    <input type="password" id="api-key-input" placeholder="Enter your API key">
                </div>
                <div id="settings-modal-actions">
                    <button id="settings-save-btn">Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toolbar toggle button (hidden by default) -->
    <button id="show-toolbar-btn" class="show-toolbar-btn hidden" title="Show Toolbar">
        <i class="fa-solid fa-screwdriver-wrench"></i>
    </button>

    <!-- More Menu Dropdown (global, fixed-positioned, escapes overflow clipping) -->
    <div id="more-dropdown" class="more-dropdown hidden" role="menu">
        <button id="more-export-pdf" role="menuitem"><i class="fa-solid fa-file-pdf"></i> Export as PDF</button>
        <button id="more-export-html" role="menuitem"><i class="fa-solid fa-file-code"></i> Export as HTML</button>
        <div class="more-dropdown-divider"></div>
        <button id="more-theme-toggle" role="menuitem"><i class="fa-solid fa-moon" id="more-theme-icon"></i> <span id="more-theme-label">Toggle Theme</span></button>
        <button id="more-settings-btn" role="menuitem"><i class="fa-solid fa-cog"></i> Settings</button>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toast-container"></div>
</body>
</html>
