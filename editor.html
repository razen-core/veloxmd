<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velox Markdown</title>
    
    <!-- Preconnect to external domains for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    
    <!-- Google Fonts: Outfit, Manrope, and JetBrains Mono -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Lexend:ital,wght@0,400;0,500;0,600;0,700;1,400&family=PT+Mono:wght@400;500;700&display=swap" rel="stylesheet">
        
    <!-- Font Awesome for Icons (v7 webfonts build in icons/css/all.css) -->
    <link rel="stylesheet" href="icons/css/all.css" />
    
    <!-- JS Libraries: marked for parsing, highlight.js for syntax highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/marked@16.4.1/lib/marked.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/highlight.min.js"></script>
    
    <!-- Custom Styles and Script -->
    <link rel="stylesheet" href="style.css">
    <script src="fs-helpers.js" defer></script>
    <script src="editor.js" defer></script>
    <script src="toolbar.js" defer></script>
    <script src="ai.js" defer></script>
</head>
<body>
    <div id="app-container">
        <header id="app-header">
            <div class="header-left">
                <a href="index.html" class="back-to-dashboard" title="Back to Dashboard">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
                <button id="sidebar-toggle" title="Toggle Sidebar">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <h1 id="app-title">Velox Editor</h1>
            </div>
            <div class="controls">
                <button id="view-toggle" title="Toggle Preview">
                    <i class="fa-solid fa-eye"></i>
                </button>
                <button id="theme-toggle" title="Toggle Theme">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <button id="settings-btn" title="Settings">
                    <i class="fa-solid fa-cog"></i>
                </button>
            </div>
        </header>

        <div id="app-body">
            <aside id="sidebar" class="hidden">
                <div id="sidebar-header">
                    <h2>Outline</h2>
                </div>
                <div id="table-of-contents"></div>
            </aside>
            <main id="app-main">
                <textarea id="editor" spellcheck="false"></textarea>
                <div id="preview" class="hidden"></div>
            </main>
        </div>

        <footer id="app-footer">
            <div id="stats">
                <span>Words: <span id="word-count">0</span></span>
                <span>&nbsp;&nbsp;|&nbsp;&nbsp;</span>
                <span>Chars: <span id="char-count">0</span></span>
            </div>
        </footer>
    </div>

    <!-- Custom Modal -->
    <div id="modal-overlay" class="hidden">
        <div id="modal">
            <h3 id="modal-title"></h3>
            <p id="modal-message"></p>
            <input type="text" id="modal-input" class="hidden">
            <div id="modal-actions">
                <button id="modal-cancel-btn">Cancel</button>
                <button id="modal-confirm-btn">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Floating Toolbar -->
    <div id="floating-toolbar" class="floating-toolbar">
        <div class="toolbar-drag-handle">
            <i class="fa-solid fa-grip-lines"></i>
        </div>
        <div class="toolbar-actions">
            <!-- Action buttons -->
            <button class="toolbar-btn" data-action="insert-tab" title="Insert Tab">
                <i class="fa-solid fa-indent"></i>
            </button>

            <!-- Parentheses () -->
            <button class="toolbar-btn" data-action="insert-pair" data-pair="()" title="Insert Parentheses ()">
                <span style="font-size: 16px; font-weight: bold; font-family: var(--font-mono);">()</span>
            </button>
            
            <!-- Braces {} -->
            <button class="toolbar-btn" data-action="insert-pair" data-pair="{}" title="Insert Braces {}">
                <span style="font-size: 16px; font-weight: bold; font-family: var(--font-mono);">{}</span>
            </button>
            
            <!-- Brackets [] -->
            <button class="toolbar-btn" data-action="insert-pair" data-pair="[]" title="Insert Brackets []">
                <span style="font-size: 16px; font-weight: bold; font-family: var(--font-mono);">[]</span>
            </button>

            <button class="toolbar-btn" data-action="move-left" title="Move Left">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <button class="toolbar-btn" data-action="move-right" title="Move Right">
                <i class="fa-solid fa-arrow-right"></i>
            </button>
            <button class="toolbar-btn" data-action="move-up" title="Move Up">
                <i class="fa-solid fa-arrow-up"></i>
            </button>
            <button class="toolbar-btn" data-action="move-down" title="Move Down">
                <i class="fa-solid fa-arrow-down"></i>
            </button>
            <button id="ai-mode-btn" class="toolbar-btn" title="AI Mode">
                <i class="fa-solid fa-sparkles"></i>
            </button>
        </div>
        <button class="toolbar-close-btn" title="Close Toolbar">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>

    <!-- AI Modal -->
    <div id="ai-modal-overlay" class="hidden">
        <div id="ai-modal">
            <div id="ai-modal-header">
                <div class="header-left-content">
                    <h2>AI Assistant</h2>
                    <div class="model-selector-container">
                        <i class="fa-solid fa-robot"></i>
                        <select id="ai-model-selector">
                            <option value="models/gemini-3-flash-preview">Gemini 3.0 Flash</option>
                            <option value="models/gemini-flash-latest">Gemini 2.5 Flash</option>
                        </select>
                    </div>
                </div>
                <button id="ai-modal-close-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="ai-modal-body">
                <div id="ai-chat-container"></div>
                <div id="ai-input-container">
                    <textarea id="ai-input" placeholder="Ask AI to write or edit..."></textarea>
                    <button id="ai-send-btn">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal-overlay" class="hidden">
        <div id="settings-modal">
            <div id="settings-modal-header">
                <h2>Settings</h2>
                <button id="settings-modal-close-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="settings-modal-body">
                <div class="settings-field">
                    <label for="api-key-input">Gemini API Key</label>
                    <input type="password" id="api-key-input" placeholder="Enter your API key">
                </div>
                <div id="settings-modal-actions">
                    <button id="settings-save-btn">Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toolbar toggle button (hidden by default) -->
    <button id="show-toolbar-btn" class="show-toolbar-btn hidden" title="Show Toolbar">
        <i class="fa-solid fa-screwdriver-wrench"></i>
    </button>
</body>
</html>
