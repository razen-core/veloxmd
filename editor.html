<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Markdown</title>

    <!-- Google Fonts: Poppins for UI, Rubik for headers, Google Sans Code for code -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&family=Rubik:wght@500;700&family=Google+Sans+Code:wght@400;500&display=swap" rel="stylesheet">

    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="icons/css/all.css" />

    <!-- JS Libraries: marked for parsing, highlight.js for syntax highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <!-- I will manage the highlight.js theme via CSS to support light/dark modes -->

    <!-- Custom Styles and Script -->
    <link rel="stylesheet" href="style.css">
    <script src="editor.js" defer></script>
</head>
<body>
    <div id="app-container">
        <header id="app-header">
            <div class="header-left">
                <a href="index.html" class="back-to-dashboard" title="Back to Dashboard">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <button id="sidebar-toggle" title="Toggle Sidebar">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 id="app-title">Pro Editor</h1>
            </div>
            <div class="controls">
                <button id="view-toggle" title="Toggle Preview">
                    <i class="fas fa-eye"></i>
                </button>
                <button id="theme-toggle" title="Toggle Theme">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>

        <div id="app-body">
            <aside id="sidebar">
                <div id="sidebar-header">
                    <h2>Outline</h2>
                </div>
                <div id="table-of-contents"></div>
            </aside>
            <main id="app-main">
                <textarea id="editor" spellcheck="false"></textarea>
                <div id="preview" class="hidden"></div>
            </main>
        </div>

        <footer id="app-footer">
            <div id="stats">
                <span>Words: <span id="word-count">0</span></span>
                <span>&nbsp;&nbsp;|&nbsp;&nbsp;</span>
                <span>Chars: <span id="char-count">0</span></span>
            </div>
        </footer>
    </div>

    <!-- Custom Modal -->
    <div id="modal-overlay" class="hidden">
        <div id="modal">
            <h3 id="modal-title"></h3>
            <p id="modal-message"></p>
            <input type="text" id="modal-input" class="hidden">
            <div id="modal-actions">
                <button id="modal-cancel-btn">Cancel</button>
                <button id="modal-confirm-btn">Confirm</button>
            </div>
        </div>
    </div>
</body>
</html>
