<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="theme-color" content="#0f172a">
    <title>Pro MarkDown - Professional Dashboard</title>
    <meta name="description" content="Pro MarkDown is a next-generation markdown editor dashboard designed for speed, clarity, and professional workflow management.">
    <meta name="keywords" content="markdown editor, dashboard, productivity, writing tool, pro markdown, cms">
    <meta name="author" content="Pro MarkDown">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Pro MarkDown - Professional Dashboard">
    <meta property="og:description" content="Experience the ultimate professional markdown workflow.">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="Pro MarkDown - Professional Dashboard">
    <meta property="twitter:description" content="Experience the ultimate professional markdown workflow.">

    <link rel="icon" type="image/png" href="assets/favicon.png">

    <!-- Google Fonts: Poppins for UI, Rubik for headers, Google Sans Code for code -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- JS Libraries: marked for parsing, highlight.js for syntax highlighting -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/16.3.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
    <!-- I will manage the highlight.js theme via CSS to support light/dark modes -->

    <!-- Custom Styles and Script -->
    <link rel="stylesheet" href="style.css">
    <script src="editor.js" defer></script>
</head>
<body>
    <div id="app-container">
        <header id="app-header">
            <div class="header-left">
                <a href="index.html" class="back-to-dashboard" title="Back to Dashboard">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <button id="sidebar-toggle" title="Toggle Sidebar">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 id="app-title">Pro Editor</h1>
            </div>
            <div class="controls">
                <button id="view-toggle" title="Toggle Preview">
                    <i class="fas fa-eye"></i>
                </button>
                <button id="theme-toggle" title="Toggle Theme">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>

        <div id="app-body">
            <aside id="sidebar">
                <div id="sidebar-header">
                    <h2>Outline</h2>
                </div>
                <div id="table-of-contents"></div>
            </aside>
            <main id="app-main">
                <textarea id="editor" spellcheck="false"></textarea>
                <div id="preview" class="hidden"></div>
            </main>
        </div>

        <footer id="app-footer">
            <div id="stats">
                <span>Words: <span id="word-count">0</span></span>
                <span>&nbsp;&nbsp;|&nbsp;&nbsp;</span>
                <span>Chars: <span id="char-count">0</span></span>
            </div>
        </footer>
    </div>

    <!-- Custom Modal -->
    <div id="modal-overlay" class="hidden">
        <div id="modal">
            <h3 id="modal-title"></h3>
            <p id="modal-message"></p>
            <input type="text" id="modal-input" class="hidden">
            <div id="modal-actions">
                <button id="modal-cancel-btn">Cancel</button>
                <button id="modal-confirm-btn">Confirm</button>
            </div>
        </div>
    </div>
</body>
</html>
